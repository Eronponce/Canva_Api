services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canvas-bulk-panel
    init: true
    restart: unless-stopped
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

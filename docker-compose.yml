x-idle-shutdown-env: &idle-shutdown-env
  PANEL_IDLE_SHUTDOWN_ENABLED: "true"
  PANEL_IDLE_TIMEOUT_SECONDS: "10800"
  PANEL_IDLE_CHECK_INTERVAL_SECONDS: "60"
  PANEL_IDLE_ACTIVITY_FILE: "/tmp/canvas-bulk-panel.last-activity"

services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canvas-bulk-panel
    init: true
    restart: on-failure
    environment:
      <<: *idle-shutdown-env
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
